# Render Blueprint for SITE PULSE.
# Render → Blueprints → New Blueprint Instance → pick this repo, and it creates
# the web service preconfigured. Secrets (sync:false) are entered in the dashboard.
services:
  - type: web
    name: site-pulse
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    # /login is always public (200); "/" redirects to it once auth is on.
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: CENSUS_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # --- Auth (Microsoft SSO, invite-only). Auth stays OFF until SESSION_SECRET is set. ---
      - key: SESSION_SECRET
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false
